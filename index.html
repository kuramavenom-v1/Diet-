<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام غذائي - الواجهة الرئيسية</title>
    <style>
        /* إعدادات الخلفية العامة للموقع باللون الأسود العميق */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #05070f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* هالات التوهج الزرقاء في الخلفية لتعطي طابع النيون */
        .bg-glow-1 {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.2) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            text-align: center;
        }

        /* شعار اللوجو العلوي المتوهج */
        .cyber-logo {
            font-size: 32px;
            font-weight: 900;
            color: #00f2fe;
            text-shadow: 0 0 15px #00f2fe, 0 0 30px #0066ff;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        /* الكرت الرئيسي للموقع */
        .main-card {
            background: rgba(10, 15, 30, 0.85);
            border: 2px solid #0066ff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.3), inset 0 0 20px rgba(0, 242, 254, 0.1);
            backdrop-filter: blur(10px);
        }

        h1.title {
            font-size: 28px;
            color: #ffffff;
            margin: 0 0 15px 0;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 16px;
            color: #00f2fe;
            margin: 0 0 40px 0;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }

        /* خط التقسيم المتوهج */
        .matrix-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2fe, #0066ff, transparent);
            width: 90%;
            margin: 0 auto 40px auto;
        }

        /* حاوية الأزرار */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        /* التصميم الأساسي للأزرار السيبرانية مع تأثير الانتفاضة المستمرة */
        .cyber-btn {
            flex: 1;
            padding: 20px 10px;
            background: linear-gradient(135deg, #020813 0%, #0a1931 100%);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            
            /* هنا السحر: استدعاء أنيميشن الانتفاضة والاهتزاز بشكل مستمر */
            animation: cyberJitter 0.3s infinite linear;
        }

        /* زر النظام الأول - O وتوهجه الخاص */
        .btn-o {
            border: 2px solid #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 0 10px rgba(0, 242, 254, 0.1);
            animation-duration: 0.25s; /* سرعة انتفاضة مختلفة لتعطي عشوائية */
        }
        
        /* زر النظام الثاني - H وتوهجه الخاص */
        .btn-h {
            border: 2px solid #ff0055; /* تدرج لوني مميز للزر الثاني */
            text-shadow: 0 0 10px #ff0055;
            box-shadow: 0 0 15px rgba(ff, 0, 55, 0.2), inset 0 0 10px rgba(ff, 0, 55, 0.1);
            animation-duration: 0.28s;
        }

        /* تأثيرات إضافية عند تمرير الماوس (Hover) لتزيد من الحماس */
        .cyber-btn:hover {
            scale: 1.05;
            background: #0066ff;
            color: #fff;
            text-shadow: 0 0 15px #fff;
            box-shadow: 0 0 30px #0066ff;
            animation: none; /* يثبت الزر عند التأشير عليه ويركز التوهج */
        }

        .btn-h:hover {
            background: #ff0055;
            box-shadow: 0 0 30px #ff0055;
        }

        /* الأقواس الديكورية داخل الأزرار */
        .cyber-btn::before { content: "[ "; color: #00f2fe; }
        .cyber-btn::after { content: " ]"; color: #00f2fe; }
        .btn-h::before, .btn-h::after { color: #ffffff; }

        /* كود أنيميشن "الانتفاضة والاهتزاز العشوائي السريع" المدمر */
        @keyframes cyberJitter {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            20% { transform: translate(1px, 1px) rotate(0.5deg); }
            30% { transform: translate(-2px, 1px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 2px) rotate(-0.5deg); }
            60% { transform: translate(2px, -1px) rotate(0deg); }
            70% { transform: translate(-1px, -1px) rotate(0.5deg); }
            80% { transform: translate(1px, 1px) rotate(-0.5deg); }
            90% { transform: translate(-2px, -1px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* فوتر النظام السفلي */
        .system-status {
            margin-top: 40px;
            font-size: 12px;
            color: #4b5563;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00f2fe;
            border-radius: 50%;
            margin-left: 6px;
            box-shadow: 0 0 8px #00f2fe;
        }
    </style>
</head>
<body>

    <!-- هالات التوهج الخلفية -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <!-- اسم اللوجو الخاص بك -->
        <div class="cyber-logo">VENOM SYSTEM</div>

        <!-- الكرت الرئيسي والخيارات -->
        <div class="main-card">
            <h1 class="title">الدخول إلى النظام الغذائي المخصص</h1>
            <p class="subtitle">اختر بوابة النظام الصحي المشفر للبدء في تدمير الدهون واكتساب اللياقة</p>
            
            <div class="matrix-line"></div>

            <!-- أزرار الأنظمة المنتفضة والمتوهجة -->
            <div class="button-group">
                <a class="cyber-btn btn-o">النظام الأول - O</a>
                <a class="cyber-btn btn-h">النظام الثاني - H</a>
            </div>
        </div>

        <!-- حقوق النظام الخاص بك -->
        <div class="system-status">
            <span class="status-dot"></span> SECURE ACCESS SYSTEM CORE v3.0 // EXCLUSIVE TO VENOM
        </div>
    </div>

</body>
</html>
