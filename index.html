<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H SYSTEM - نظام غذائي</title>
    <style>
        /* إعدادات الخلفية العامة للموقع باللون الأسود العميق */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #05070f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* هالات التوهج الزرقاء في الخلفية لتعطي طابع النيون */
        .bg-glow-1 {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.2) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            text-align: center;
            padding: 20px 0;
        }

        /* شعار اللوجو العلوي المتوهج */
        .cyber-logo {
            font-size: 32px;
            font-weight: 900;
            color: #00f2fe;
            text-shadow: 0 0 15px #00f2fe, 0 0 30px #0066ff;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        /* الكرت الرئيسي للموقع */
        .main-card {
            background: rgba(10, 15, 30, 0.85);
            border: 2px solid #0066ff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.3), inset 0 0 20px rgba(0, 242, 254, 0.1);
            backdrop-filter: blur(10px);
        }

        h1.title {
            font-size: 26px;
            color: #ffffff;
            margin: 0 0 15px 0;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 15px;
            color: #00f2fe;
            margin: 0 0 30px 0;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
            line-height: 1.6;
        }

        /* خط التقسيم المتوهج بتأثير الأمواج المتحركة */
        .matrix-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #00f2fe, #ff0055, #00f2fe, transparent);
            background-size: 200% 100%;
            width: 90%;
            margin: 0 auto 35px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            animation: waveGlow 3s infinite linear;
        }

        @keyframes waveGlow {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* بوابة كلمة المرور */
        .password-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .cyber-input {
            width: 80%;
            max-width: 300px;
            padding: 12px 20px;
            background: rgba(5, 7, 15, 0.8);
            border: 2px solid #00f2fe;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
            transition: all 0.3s ease;
        }

        .cyber-input:focus {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            border-color: #ff0055;
        }

        /* حاوية الأزرار (مخفية في البداية) */
        .button-group {
            display: none;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        /* التصميم الأساسي للأزرار السيبرانية بدون ارتعاش */
        .cyber-btn {
            flex: 1;
            padding: 18px 10px;
            background: linear-gradient(135deg, #020813 0%, #0a1931 100%);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* زر النظام الأول - O */
        .btn-o {
            border: 2px solid #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 0 10px rgba(0, 242, 254, 0.1);
        }
        
        /* زر النظام الثاني - H */
        .btn-h {
            border: 2px solid #ff0055;
            text-shadow: 0 0 10px #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2), inset 0 0 10px rgba(255, 0, 85, 0.1);
        }

        /* تأثير التمرير (Hover) الاحترافي */
        .cyber-btn:hover {
            transform: translateY(-4px);
            color: #fff;
            text-shadow: 0 0 15px #fff;
        }

        .btn-o:hover {
            background: #00f2fe;
            color: #05070f;
            box-shadow: 0 0 30px #00f2fe;
        }

        .btn-h:hover {
            background: #ff0055;
            box-shadow: 0 0 30px #ff0055;
        }

        .cyber-btn::before { content: "[ "; color: #00f2fe; transition: color 0.3s; }
        .cyber-btn::after { content: " ]"; color: #00f2fe; transition: color 0.3s; }
        .btn-h::before, .btn-h::after { color: #ff0055; }
        
        .cyber-btn:hover::before, .cyber-btn:hover::after {
            color: #ffffff;
        }

        /* فوتر النظام السفلي */
        .system-status {
            margin-top: 40px;
            font-size: 11px;
            color: #4b5563;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00f2fe;
            border-radius: 50%;
            margin-left: 6px;
            box-shadow: 0 0 8px #00f2fe;
        }

        /* إعدادات التوافق الكامل مع الجوال المتجاوب */
        @media (max-width: 600px) {
            .main-card {
                padding: 30px 20px;
            }
            h1.title {
                font-size: 22px;
            }
            .button-group {
                flex-direction: column;
                gap: 15px;
            }
            .cyber-btn {
                width: 100%;
                box-sizing: border-box;
            }
            .cyber-input {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <div class="cyber-logo">H SYSTEM</div>

        <div class="main-card">
            <h1 class="title" id="card-title">بوابة التحقق الأمنية</h1>
            <p class="subtitle" id="card-subtitle">أدخل مفتاح التشفير الخاص بك للوصول إلى الأنظمة الغذائية المخصصة</p>
            
            <div class="matrix-line"></div>

            <div class="password-section" id="auth-gate">
                <input type="password" id="sys-pass" class="cyber-input" placeholder="••••••••" autocomplete="off">
                <a class="cyber-btn btn-o" onclick="checkAccess()" style="flex: none; width: 150px; padding: 12px 0; font-size: 16px;">تأكيد الدخول</a>
            </div>

            <div class="button-group" id="systems-gate">
                <a href="system-o.html" class="cyber-btn btn-o">النظام الأول - O</a>
                <a href="system-h.html" class="cyber-btn btn-h">النظام الثاني - H</a>
            </div>
        </div>

        <div class="system-status">
            <span class="status-dot"></span> SECURE ACCESS SYSTEM CORE v3.0 // EXCLUSIVE TO H SYSTEM
        </div>
    </div>

    <script>
        // كلمة المرور مشفرة بـ Base64 لضمان عدم قراءتها مباشرة من الـ Source Code كـ نص صريح
        // النص المشفر يعبر عن القيمة "oohh"
        const _vKey = "b29oaA==";

        function checkAccess() {
            const inputField = document.getElementById('sys-pass');
            const userPass = inputField.value;
            
            // فك التشفير ومقارنته بمدخلات المستخدم
            if (userPass === atob(_vKey)) {
                // تغيير العناوين والواجهة بسلاسة لفتح الأنظمة
                document.getElementById('card-title').innerText = "الدخول إلى النظام الغذائي المخصص";
                document.getElementById('card-subtitle').innerText = "اختر بوابة النظام الصحي للبدء في تدمير الدهون واكتساب اللياقة";
                document.getElementById('auth-gate').style.display = 'none';
                
                // إظهار الأزرار المخصصة للأنظمة الغذائية
                const sysGate = document.getElementById('systems-gate');
                sysGate.style.display = 'flex';
                
                // تعديل مظهر حاوية الأزرار على الجوال عند الفتح
                if(window.innerWidth <= 600) {
                    sysGate.style.flexDirection = 'column';
                }
            } else {
                alert('عذرًا.. مفتاح التشفير غير صحيح! حاول مجددًا.');
                inputField.value = '';
                inputField.focus();
            }
        }

        // تفعيل زر الإنتر للكيبورد لتسهيل الدخول
        document.getElementById('sys-pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAccess();
            }
        });
    </script>
</body>
</html>
